; PlatformIO Project Configuration File
; One environment per vehicle — run 'pio run -e scuba' to build a specific one,
; or 'pio run' to build all and catch cross-vehicle regressions.

[env_base]
platform    = https://github.com/maxgerhardt/platform-raspberrypi.git
board       = pico
board_build.core = earlephilhower
framework   = arduino
lib_deps    =
    adafruit/Adafruit SSD1306@^2.5.11
    adafruit/Adafruit GFX Library@^1.11.10
    robtillaart/PCA9635@^0.6.0
    robotis-git/Dynamixel2Arduino@^0.8.1

; Helper: list all platform files so each env can exclude the ones it doesn't need
[platform_files]
all = src/platform_scuba.cpp
      src/platform_ami.cpp
      src/platform_lumi.cpp
      src/platform_animaltroniek.cpp
      src/platform_animal_love.cpp
      src/platform_washmachine.cpp
      src/platform_stofzuiger.cpp

[env:scuba]
extends     = env_base
build_flags = -DSCUBA
build_src_filter =
    +<*>
    -<platform_ami.cpp>
    -<platform_lumi.cpp>
    -<platform_animaltroniek.cpp>
    -<platform_animal_love.cpp>
    -<platform_washmachine.cpp>
    -<platform_stofzuiger.cpp>

[env:ami]
extends     = env_base
build_flags = -DAMI
build_src_filter =
