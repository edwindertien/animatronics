; PlatformIO Project Configuration File
; One environment per vehicle — run 'pio run -e scuba' to build a specific one,
; or 'pio run' to build all and catch cross-vehicle regressions.

[env_base]
platform    = https://github.com/maxgerhardt/platform-raspberrypi.git
board       = pico
board_build.core = earlephilhower
framework   = arduino
; ddsm-ctrl is a local library in lib/ddsm-ctrl/ (patched: pSerial as Stream*,
; ddsm115_fb hardcoded Serial1 bug fixed). Remove owennewo/ddsm-ctrl from here.
lib_deps    =
    adafruit/Adafruit SSD1306@^2.5.11
    adafruit/Adafruit GFX Library@^1.11.10
    robtillaart/PCA9635@^0.6.0
    robotis-git/Dynamixel2Arduino@^0.8.1

[env:scuba]
extends     = env_base
build_flags = -DSCUBA
build_src_filter =
    +<*>
    -<platform_ami.cpp>
    -<platform_lumi.cpp>
    -<platform_animaltroniek.cpp>
    -<platform_animal_love.cpp>
    -<platform_washmachine.cpp>
    -<platform_stofzuiger.cpp>

[env:ami]
extends     = env_base
build_flags = -DAMI
build_src_filter =
    +<*>
    -<platform_scuba.cpp>
    -<platform_lumi.cpp>
    -<platform_animaltroniek.cpp>
    -<platform_animal_love.cpp>
    -<platform_washmachine.cpp>
    -<platform_stofzuiger.cpp>

